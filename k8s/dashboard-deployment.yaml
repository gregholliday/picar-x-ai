apiVersion: apps/v1
kind: Deployment
metadata:
  name: picar-dashboard
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: picar-dashboard
  template:
    metadata:
      labels:
        app: picar-dashboard
    spec:
      containers:
      - name: picar-dashboard
        image: YOUR_REGISTRY/picar-dashboard:latest
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: picar-dashboard
  namespace: default
spec:
  selector:
    app: picar-dashboard
  ports:
  - port: 80
    targetPort: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: picar-dashboard
  namespace: default
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
  - host: picar.lab
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: picar-dashboard
            port:
              number: 80
